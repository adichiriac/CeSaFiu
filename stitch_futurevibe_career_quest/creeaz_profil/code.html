<!DOCTYPE html>

<html lang="ro"><head>

<style>
        .neo-brutalism-shadow {
            box-shadow: 4px 4px 0px 0px #000000;
        }
        .neo-brutalism-shadow-lg {
            box-shadow: 8px 8px 0px 0px #000000;
        }
        .neo-brutalism-border {
            border: 2px solid #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FBF6EE] text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center p-margin-mobile">
<div class="w-full max-w-[400px] flex flex-col gap-lg relative">
<!-- Decorative Elements -->
<div class="absolute -top-12 -right-8 w-24 h-24 bg-secondary-container rounded-full neo-brutalism-border neo-brutalism-shadow z-0 flex items-center justify-center transform rotate-12">
<span class="material-symbols-outlined text-4xl text-on-secondary-container" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<div class="absolute top-32 -left-6 w-16 h-16 bg-tertiary-fixed rounded-full border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] z-0 flex items-center justify-center transform -rotate-12">
<span class="material-symbols-outlined text-2xl text-on-tertiary-fixed" data-icon="bolt" data-weight="fill" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<!-- Main Card -->
<main class="bg-surface-container-lowest neo-brutalism-border neo-brutalism-shadow-lg p-md relative z-10">
<!-- Header Section -->
<header class="mb-md text-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs uppercase">Salvează-ți<br/>Drumul</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Creează-ți un profil pentru a primi ghidul tău personalizat de carieră și pentru a salva facultățile preferate.
                </p>
</header>
<!-- Form Section -->
<form class="flex flex-col gap-sm">
<!-- Nume Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="nume">Nume</label>
<input class="w-full bg-[#FBF6EE] neo-brutalism-border px-sm py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:bg-primary-fixed focus:border-black transition-colors" id="nume" name="nume" placeholder="Cum îți zic prietenii?" type="text"/>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="email">Email</label>
<input class="w-full bg-[#FBF6EE] neo-brutalism-border px-sm py-sm font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:bg-primary-fixed focus:border-black transition-colors" id="email" name="email" placeholder="adresa@de-mail.com" type="email"/>
</div>
<!-- Clasa Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface uppercase" for="clasa">Clasa</label>
<div class="relative">
<select class="w-full bg-[#FBF6EE] neo-brutalism-border px-sm py-sm font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:bg-primary-fixed focus:border-black transition-colors rounded-none" id="clasa" name="clasa">
<option disabled="" selected="" value="">Alege clasa...</option>
<option value="9">Clasa a 9-a</option>
<option value="10">Clasa a 10-a</option>
<option value="11">Clasa a 11-a</option>
<option value="12">Clasa a 12-a</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="mt-md flex flex-col gap-sm">
<button class="w-full bg-primary text-on-primary neo-brutalism-border neo-brutalism-shadow py-sm font-label-bold text-label-bold uppercase tracking-wider hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:bg-surface-tint" type="submit">
                        CREEAZĂ PROFIL
                    </button>
<button class="w-full py-sm font-label-bold text-label-bold text-on-surface-variant uppercase hover:text-primary transition-colors" type="button">
                        Continuă ca vizitator
                    </button>
</div>
</form>
</main>
</div>
</body></html>
