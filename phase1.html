<style>
  /* Phase 1 preview banner — discreet but visible. Doesn't change prototype layout. */
  .p1-banner {
    position: fixed; left: 0; right: 0; top: 0; z-index: 9999;
    padding: 8px 14px;
    background: var(--purple, #5b3fff); color: #fff;
    font: 600 12px/1.4 system-ui, sans-serif; letter-spacing: 0.02em;
    text-align: center; border-bottom: 2px solid #000;
  }
  .p1-banner b { font-weight: 800; }
  .p1-banner a { color: #ffeb3b; text-decoration: underline; }
  .p1-banner .x {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: transparent; color: #fff; border: none; font-size: 18px;
    cursor: pointer; padding: 4px 8px; line-height: 1;
  }
  body.p1-with-banner { padding-top: 38px; }
  @media (max-width: 480px) {
    .p1-banner { font-size: 11px; padding: 7px 30px 7px 10px; }
    body.p1-with-banner { padding-top: 44px; }
  }
</style>

<div id="root"></div>

<script>
  // Tag every Umami event from this surface so we can split Phase 1 from pilot.
  window.CESAFIU_SURFACE = 'phase1-preview';
  // Helper used by prototype screens (signup, share). Defined here so it works
  // even if the prototype's own helper isn't present.
  window.umamiTrack = function(name, data){
    try {
      if (window.umami) window.umami.track(name, Object.assign({ surface: 'phase1-preview' }, data || {}));
    } catch(e) {}
  };
  // Fire a once-per-load event so the funnel is unambiguous.
  document.addEventListener('DOMContentLoaded', function(){
    setTimeout(function(){ window.umamiTrack('phase1_preview_loaded', { ts: Date.now() }); }, 600);
  });
</script>
